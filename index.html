<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NO BROKER | নো ব্রোকার</title>
<style>
:root { --teal-bg: #006d77; --accent: #ffb703; --card-bg: #83c5be; }
body { background: var(--teal-bg); color: #fff; font-family: sans-serif; margin: 0; }
.app { max-width: 480px; margin: 0 auto; padding: 20px; }

/* New Card Colors */
.card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
.card:active { transform: scale(0.98); }

/* Status Badges */
.status-badge { padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
.status-sale { background: #2a9d8f; }
.status-sold { background: #e76f51; }

.inp { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
.submit-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
#payment-section { display: none; margin-top: 20px; padding: 20px; border: 2px solid var(--accent); }
</style>
</head>
<body>
<div class="app">
    <h1>NO BROKER</h1>

    <div id="home-screen">
        <div class="card" onclick="scrollToSection('seller-screen')">🌾 Sell Land</div>
        <div class="card" onclick="scrollToSection('buyer-screen')">🔍 Buy Land</div>
        <div id="listings-container"></div>
    </div>

    <div id="seller-screen" style="margin-top:50px;">
        <h2>List Your Land</h2>
        <input type="text" id="s-po" class="inp" placeholder="Post Office">
        <input type="number" id="s-price" class="inp" placeholder="Price">
        <input type="text" id="s-pass" class="inp" placeholder="Create Seller Password (for status change)">
        <button class="submit-btn" onclick="goToPayment()">Proceed to Pay</button>
    </div>

    <div id="payment-section">
        <h3>Pay ₹499 to Publish</h3>
        <button class="submit-btn" onclick="completeListing()">Confirm Payment</button>
    </div>
</div>

<script>
let pendingListing = null;
let listings = [];

function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

function goToPayment() {
    pendingListing = { 
        po: document.getElementById('s-po').value, 
        price: document.getElementById('s-price').value,
        pass: document.getElementById('s-pass').value,
        status: 'FOR SALE'
    };
    document.getElementById('payment-section').style.display = 'block';
    scrollToSection('payment-section');
}

function completeListing() {
    listings.push(pendingListing);
    alert("Thank You, your land details will be displayed in few minutes");
    renderListings();
    document.getElementById('payment-section').style.display = 'none';
}

function toggleStatus(index) {
    let pass = prompt("Enter Seller Password:");
    if(pass === listings[index].pass) {
        listings[index].status = (listings[index].status === 'FOR SALE') ? 'SOLD' : 'FOR SALE';
        renderListings();
    } else {
        alert("Incorrect Password");
    }
}

function renderListings() {
    let container = document.getElementById('listings-container');
    container.innerHTML = listings.map((l, i) => `
        <div class="card">
            <span class="status-badge ${l.status === 'FOR SALE' ? 'status-sale' : 'status-sold'}" onclick="toggleStatus(${i})">${l.status}</span>
            <h3>${l.po}</h3>
            <p>₹${l.price}</p>
        </div>
    `).join('');
}
</script>
</body>
</html>
