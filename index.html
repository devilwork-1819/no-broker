<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f3d2a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="NO BROKER"/>
<title>NO BROKER | নো ব্রোকার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:'Hind Siliguri',Georgia,serif;background:#0f3d2a;color:#fdf6e3;overflow-x:hidden;}
input,textarea,button,select{font-family:'Hind Siliguri',Georgia,serif;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.35);}
input:focus,textarea:focus,select:focus{outline:none;border-color:#d4a017!important;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(212,160,23,0.4);border-radius:2px;}
.app{min-height:100vh;background:linear-gradient(160deg,#0f3d2a 0%,#1a1a2e 60%,#2d1b00 100%);}
.bgfx{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 15% 15%,rgba(212,160,23,0.08) 0%,transparent 50%),radial-gradient(circle at 85% 85%,rgba(26,122,74,0.14) 0%,transparent 50%);pointer-events:none;z-index:0;}
.wrap{max-width:480px;margin:0 auto;padding-bottom:70px;position:relative;z-index:1;}
.hdr{padding:14px 16px 10px;border-bottom:1px solid rgba(212,160,23,0.2);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.35);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;letter-spacing:1px;background:linear-gradient(90deg,#d4a017,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:8px;color:rgba(212,160,23,0.6);letter-spacing:2px;text-transform:uppercase;margin-top:-2px;}
.lang-btn{background:rgba(212,160,23,0.12);border:1px solid #d4a017;color:#d4a017;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
#home-screen{display:block;padding:0;}
.hero{padding:28px 16px 16px;text-align:center;}
.hero-icon{font-size:52px;margin-bottom:10px;}
.hero-title{font-size:22px;font-weight:800;line-height:1.25;background:linear-gradient(135deg,#fff 0%,#d4a017 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;max-width:300px;margin:0 auto 24px;}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 16px;}
.card{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px 12px;cursor:pointer;text-align:center;transition:background 0.2s;}
.card:active{background:rgba(26,122,74,0.3);}
.card-icon{font-size:34px;margin-bottom:8px;}
.card-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:5px;}
.card-desc{font-size:11px;color:rgba(255,255,255,0.55);line-height:1.5;}
.card-fee{font-size:12px;font-weight:800;color:#d4a017;margin-top:6px;}
.list-btn{margin:0 14px 16px;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.35);border-radius:14px;padding:14px;text-align:center;cursor:pointer;color:#d4a017;font-size:14px;font-weight:600;}
.how-box{margin:0 14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;}
.how-title{font-size:13px;font-weight:800;color:#d4a017;margin-bottom:10px;}
.how-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.how-num{width:22px;height:22px;background:#d4a017;color:#1a1a2e;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.how-text{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.5;}
.footer-note{text-align:center;font-size:11px;color:rgba(255,255,255,0.25);padding:0 16px 16px;}
.back-btn{background:transparent;border:none;color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;padding:0 0 14px;display:block;font-family:inherit;}
.form-title{font-size:20px;font-weight:800;margin-bottom:3px;color:#fff;}
.form-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:18px;}
.lbl{font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:5px;display:block;font-weight:600;}
.inp{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:11px;padding:12px 13px;color:#fff;font-size:14px;font-family:inherit;outline:none;display:block;margin-bottom:13px;}
.inp[readonly]{color:rgba(255,255,255,0.5);}
textarea.inp{min-height:80px;resize:none;}
select.inp{appearance:none;-webkit-appearance:none;cursor:pointer;}
select.inp option{background:#1a1a2e;color:#fff;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.media-box{border:2px dashed rgba(212,160,23,0.35);border-radius:13px;padding:18px 14px;text-align:center;margin-bottom:13px;cursor:pointer;background:rgba(212,160,23,0.04);}
.media-box-icon{font-size:30px;margin-bottom:6px;}
.media-box-lbl{font-size:12px;color:rgba(255,255,255,0.45);}
.media-name{font-size:11px;color:#d4a017;margin-top:6px;}
.photo-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px;}
.photo-thumb{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1.5px solid rgba(212,160,23,0.4);}
.check-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:#d4a017;cursor:pointer;flex-shrink:0;}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#d4a017,#b8860b);border:none;border-radius:13px;color:#1a1a2e;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.submit-btn:active{opacity:0.85;}
.success-box{background:rgba(26,122,74,0.25);border:1px solid #d4a017;border-radius:13px;padding:14px;text-align:center;font-size:14px;font-weight:700;color:#d4a017;margin-bottom:15px;display:none;}
.error-box{background:rgba(180,40,40,0.2);border:1px solid rgba(255,100,100,0.4);border-radius:11px;padding:11px 13px;font-size:12px;color:#ff9999;margin-bottom:13px;display:none;}
.section-divider{font-size:11px;font-weight:700;color:rgba(212,160,23,0.7);text-transform:uppercase;letter-spacing:1px;margin:6px 0 12px;padding-bottom:6px;border-bottom:1px solid rgba(212,160,23,0.15);}
.fee-banner{background:linear-gradient(135deg,rgba(212,160,23,0.15),rgba(212,160,23,0.05));border:1.5px solid rgba(212,160,23,0.4);border-radius:14px;padding:14px;margin-bottom:16px;text-align:center;}
.pay-card{background:rgba(255,255,255,0.06);border:2px solid #d4a017;border-radius:18px;padding:20px;margin-bottom:16px;}
.pay-amount{font-size:42px;font-weight:800;color:#d4a017;text-align:center;margin-bottom:4px;}
.pay-upi-box{background:rgba(212,160,23,0.1);border:1.5px dashed #d4a017;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;}
.pay-upi-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;}
.pay-upi-id{font-size:18px;font-weight:800;color:#f5c842;letter-spacing:1px;}
.pay-steps{margin-bottom:16px;}
.pay-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.pay-step-num{width:22px;height:22px;background:rgba(212,160,23,0.2);border:1px solid #d4a017;color:#d4a017;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pay-step-text{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.5;margin-top:3px;}
.pay-apps{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap;}
.pay-app-btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;text-decoration:none;display:inline-block;}
.pay-gpay{background:#4285f4;color:#fff;}
.pay-phonepe{background:#5f259f;color:#fff;}
.pay-paytm{background:#00baf2;color:#fff;}
.pay-confirm-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a7a4a,#0d5c37);border:2px solid #d4a017;border-radius:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.pay-note{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-top:10px;line-height:1.6;}
.pay-txn-inp{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:11px;padding:12px 13px;color:#fff;font-size:14px;font-family:inherit;outline:none;display:block;margin-bottom:8px;}
.pay-txn-inp::placeholder{color:rgba(255,255,255,0.35);}
.search-wrap{padding:12px 14px 0;}
.search-inp{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:11px 14px 11px 38px;color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;}
.search-inp::placeholder{color:rgba(255,255,255,0.35);}
.search-wrap-inner{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.filter-select{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:10px;padding:8px 12px;color:#fff;font-size:12px;font-family:inherit;outline:none;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.filter-select option{background:#1a1a2e;color:#fff;}
.result-count{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px;padding:0 14px;}
.listing-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px;margin-bottom:12px;}
.listing-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.listing-price{font-size:19px;font-weight:800;color:#d4a017;}
.listing-neg{font-size:10px;color:rgba(212,160,23,0.7);margin-top:1px;}
.listing-type-badge{font-size:10px;background:rgba(26,122,74,0.3);border:1px solid rgba(26,122,74,0.5);border-radius:6px;padding:3px 8px;color:rgba(255,255,255,0.8);margin-top:4px;display:inline-block;}
.verified-badge{font-size:10px;background:rgba(212,160,23,0.2);border:1px solid #d4a017;border-radius:6px;padding:3px 8px;color:#d4a017;margin-top:4px;margin-left:4px;display:inline-block;}
.media-tag{background:rgba(26,122,74,0.2);border:1px solid rgba(26,122,74,0.35);border-radius:9px;padding:8px 11px;display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;color:rgba(255,255,255,0.7);}
.listing-photos{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;}
.listing-photo{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid rgba(212,160,23,0.3);flex-shrink:0;}
.info-row{font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:5px;display:flex;gap:8px;}
.info-lbl{color:rgba(255,255,255,0.38);min-width:64px;flex-shrink:0;}
.locked-number{background:rgba(212,160,23,0.08);border:1.5px solid rgba(212,160,23,0.3);border-radius:12px;padding:12px 14px;margin-top:11px;text-align:center;}
.locked-text{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;}
.unlock-btn{width:100%;padding:12px;background:linear-gradient(135deg,#d4a017,#b8860b);border:none;border-radius:10px;color:#1a1a2e;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.unlocked-box{background:rgba(26,122,74,0.2);border:1.5px solid rgba(26,122,74,0.5);border-radius:12px;padding:12px;margin-top:11px;}
.unlocked-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px;}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px;}
.btn-call{padding:11px 4px;background:linear-gradient(135deg,#1a7a4a,#0d5c37);border:1px solid rgba(26,122,74,0.6);border-radius:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:block;}
.btn-wa{padding:11px 4px;background:linear-gradient(135deg,#25d366,#128c3e);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:block;}
.btn-maps{display:block;width:100%;padding:9px;margin-top:7px;background:rgba(66,133,244,0.15);border:1px solid rgba(66,133,244,0.35);border-radius:10px;color:#7ab3ff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;}
.share-btn{display:block;width:100%;padding:8px;margin-top:6px;background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.3);border-radius:10px;color:#25d366;font-size:12px;cursor:pointer;font-family:inherit;text-align:center;}
.no-listings{text-align:center;padding:40px 0;color:rgba(255,255,255,0.35);font-size:14px;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:linear-gradient(160deg,#0f3d2a,#1a1a2e);border:1.5px solid rgba(212,160,23,0.4);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-close{float:right;background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;line-height:28px;text-align:center;}
</style>
</head>
<body>
<div class="app">
<div class="bgfx"></div>
<div class="wrap">

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="logo" id="app-name">নো ব্রোকার</div>
    <div class="logo-sub">NO BROKER · নো ব্রোকার</div>
  </div>
  <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>
</div>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="hero">
    <div class="hero-icon">🏡</div>
    <div class="hero-title" id="h-tagline"></div>
    <div class="hero-sub" id="h-sub"></div>
  </div>
  <div class="card-row">
    <div class="card" id="sell-card" onclick="showScreen('seller-screen')">
      <div class="card-icon">🌾</div>
      <div class="card-title" id="h-sell"></div>
      <div class="card-desc" id="h-sell-desc"></div>
      <div class="card-fee" id="h-sell-fee"></div>
    </div>
    <div class="card" onclick="showScreen('buyer-screen')">
      <div class="card-icon">🔍</div>
      <div class="card-title" id="h-buy"></div>
      <div class="card-desc" id="h-buy-desc"></div>
      <div class="card-fee" id="h-buy-fee"></div>
    </div>
  </div>
  <div class="how-box">
    <div class="how-title" id="how-title"></div>
    <div class="how-row"><div class="how-num">1</div><div class="how-text" id="how-1"></div></div>
    <div class="how-row"><div class="how-num">2</div><div class="how-text" id="how-2"></div></div>
    <div class="how-row"><div class="how-num">3</div><div class="how-text" id="how-3"></div></div>
    <div class="how-row"><div class="how-num">4</div><div class="how-text" id="how-4"></div></div>
  </div>
  <div class="list-btn" onclick="showScreen('listings-screen')">
    🗺️ <span id="h-view-listings"></span> (<span id="listing-count">4/span>)
  </div>
  <div class="footer-note" id="footer-note"></div>
</div>

<!-- SELLER PAYMENT SCREEN (hidden - no longer used, direct to form) -->
<div id="seller-pay-screen" class="screen" style="display:none!important;"></div>

<!-- SELLER FORM -->
<div id="seller-screen" class="screen">
  <button class="back-btn" onclick="showScreen('home-screen')" id="s-back"></button>
  <div class="form-title" id="s-title"></div>
  <div class="form-sub" id="s-form-sub"></div>
  <div class="success-box" id="s-success"></div>
  <div class="error-box" id="s-error"></div>

  <!-- Payment banner inside form -->
  <div class="pay-card" style="margin-bottom:16px;">
    <div class="pay-amount">₹499</div>
    <div class="pay-label" id="sp-label"></div>
    <div class="pay-upi-box">
      <div class="pay-upi-label" id="sp-upi-label"></div>
      <div class="pay-upi-id">9483319235@upi</div>
    </div>
    <div class="pay-apps">
      <a class="pay-app-btn pay-gpay" href="upi://pay?pa=9483319235@upi&pn=NoBroker&am=499&cu=INR" onclick="sellerPaid()">📱 GPay</a>
      <a class="pay-app-btn pay-phonepe" href="upi://pay?pa=9483319235@upi&pn=NoBroker&am=499&cu=INR" onclick="sellerPaid()">📱 PhonePe</a>
      <a class="pay-app-btn pay-paytm" href="upi://pay?pa=9483319235@upi&pn=NoBroker&am=499&cu=INR" onclick="sellerPaid()">📱 Paytm</a>
    </div>
    <div class="pay-note" id="sp-note"></div>
  </div>

  <div class="section-divider" id="s-sec1"></div>
  <label class="lbl" id="s-video-lbl"></label>
  <div class="media-box" onclick="document.getElementById('video-input').click()">
    <div class="media-box-icon">🎥</div>
    <div class="media-box-lbl" id="s-video-tap"></div>
    <div class="media-name" id="video-name-display"></div>
  </div>
  <input type="file" id="video-input" accept="video/*" style="display:none" onchange="videoSelected(this)"/>
  <label class="lbl" id="s-photo-lbl"></label>
  <div class="media-box" onclick="document.getElementById('photo-input').click()">
    <div class="media-box-icon">📸</div>
    <div class="media-box-lbl" id="s-photo-tap"></div>
  </div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="photosSelected(this)"/>
  <div class="photo-preview" id="photo-preview"></div>
  <div class="section-divider" id="s-sec2"></div>
  <label class="lbl" id="s-district-lbl"></label>
  <select class="inp" id="s-district-val" onchange="updateDistrictDisplay()"></select>
  <label class="lbl" id="s-po-lbl"></label>
  <input class="inp" id="s-po" placeholder=""/>
  <label class="lbl" id="s-road-lbl"></label>
  <input class="inp" id="s-road" placeholder=""/>
  <label class="lbl" id="s-landmark-lbl"></label>
  <input class="inp" id="s-landmark" placeholder=""/>
  <label class="lbl" id="s-maps-lbl"></label>
  <input class="inp" id="s-maps" placeholder="https://maps.google.com/..."/>
  <div class="section-divider" id="s-sec3"></div>
  <div class="inp-row">
    <div>
      <label class="lbl" id="s-size-lbl"></label>
      <input class="inp" id="s-size" type="number" placeholder="5"/>
    </div>
    <div>
      <label class="lbl" id="s-unit-lbl"></label>
      <select class="inp" id="s-unit"></select>
    </div>
  </div>
  <label class="lbl" id="s-type-lbl"></label>
  <select class="inp" id="s-type"></select>
  <label class="lbl" id="s-facing-lbl"></label>
  <select class="inp" id="s-facing"></select>
  <div class="section-divider" id="s-sec4"></div>
  <label class="lbl" id="s-price-lbl"></label>
  <input class="inp" id="s-price" type="text" placeholder=""/>
  <div class="check-row">
    <input type="checkbox" id="s-neg"/>
    <label class="lbl" style="margin-bottom:0" id="s-neg-lbl"></label>
  </div>
  <label class="lbl" id="s-mob-lbl"></label>
  <input class="inp" id="s-mobile" type="tel" placeholder=""/>
  <button class="submit-btn" id="s-submit" onclick="submitSeller()"></button>
</div>

<!-- BUYER SCREEN -->
<div id="buyer-screen" class="screen">
  <button class="back-btn" onclick="showScreen('home-screen')" id="b-back"></button>
  <div class="form-title" id="b-title"></div>
  <div class="form-sub" id="b-form-sub"></div>
  <div class="success-box" id="b-success"></div>
  <div class="error-box" id="b-error"></div>
  <div class="fee-banner">

function setSelect(id, labels, vals){
  var el=document.getElementById(id);
  var cur=el.value;
  el.innerHTML='';
  for(var i=0;i<labels.length;i++){
    var o=document.createElement('option');
    o.textContent=labels[i];
    o.value=vals[i];
    el.appendChild(o);
  }
  el.value=cur;
}

/* ── Seller submit ───────────────────────────────────────────────── */
function submitSeller(){
  var po=document.getElementById('s-po').value.trim();
  var price=document.getElementById('s-price').value.trim();
  var mobile=document.getElementById('s-mobile').value.trim();
  var size=document.getElementById('s-size').value.trim();
  var type=document.getElementById('s-type').value;
  var district=document.getElementById('s-district-val').value;
  if(!po||!price||!mobile||!size||!type||!district){showMsg('s-error');return;}
  listings.unshift({id:Date.now(),district:district,po:po,road:document.getElementById('s-road').value.trim(),landmark:document.getElementById('s-landmark').value.trim(),price:price,priceNum:parseInt(price.replace(/[^0-9]/g,''))||0,negotiable:document.getElementById('s-neg').checked,mobile:mobile,hasVideo:!!document.getElementById('video-name-display').textContent,photos:photoDataUrls.slice(),size:size,unit:document.getElementById('s-unit').value,type:type,facing:document.getElementById('s-facing').value,maps:document.getElementById('s-maps').value.trim(),verified:true});
  document.getElementById('listing-count').textContent=listings.length;
  ['s-po','s-road','s-landmark','s-price','s-mobile','s-size','s-maps'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('s-neg').checked=false;document.getElementById('s-type').value='';document.getElementById('s-facing').value='';
  document.getElementById('video-name-display').textContent='';document.getElementById('photo-preview').innerHTML='';photoDataUrls=[];
  showMsg('s-success');setTimeout(function(){showScreen('listings-screen');},2000);
}

function populateDistrictDropdowns(){
  var labels = lang==='bn' ? WB_DISTRICTS_BN : WB_DISTRICTS;
  var placeholder = lang==='bn' ? '-- জেলা বেছে নিন --' : '-- Select District --';
  var filterPlaceholder = lang==='bn' ? '📍 সব জেলা' : '📍 All Districts';

  // Seller & Buyer district (required selection)
  ['s-district-val','b-district-val'].forEach(function(selId){
    var sel = document.getElementById(selId);
    if(!sel) return;
    var cur = sel.value;
    sel.innerHTML = '<option value="">'+placeholder+'</option>';
    WB_DISTRICTS.forEach(function(d,i){
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = lang==='bn' ? WB_DISTRICTS_BN[i] : d;
      sel.appendChild(opt);
    });
    if(selId==='s-district-val' && !cur) sel.value='Birbhum';
    else if(cur) sel.value=cur;
  });

  // Filter district (has "All" option)
  var fSel = document.getElementById('filter-district');
  if(fSel){
    var cur = fSel.value;
    fSel.innerHTML = '<option value="">'+filterPlaceholder+'</option>';
    WB_DISTRICTS.forEach(function(d,i){
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = lang==='bn' ? WB_DISTRICTS_BN[i] : d;
      fSel.appendChild(opt);
    });
    if(cur) fSel.value=cur;
  }
}

/* ── Filter & Render ─────────────────────────────────────────────── */
function applyFilters(){
  var t=T[lang];
  var q=(document.getElementById('search-inp').value||'').toLowerCase().trim();
  var fT=document.getElementById('filter-type').value||'';
  var fP=document.getElementById('filter-price').value||'';
  var fN=document.getElementById('filter-neg').value||'';
  var fD=document.getElementById('filter-district') ? document.getElementById('filter-district').value||'' : '';
  var filtered=listings.filter(function(item){
    if(q&&(item.po||'').toLowerCase().indexOf(q)===-1&&(item.road||'').toLowerCase().indexOf(q)===-1&&(item.landmark||'').toLowerCase().indexOf(q)===-1&&(item.district||'').toLowerCase().indexOf(q)===-1)return false;
    if(fT&&item.type!==fT)return false;
    if(fP==='low'&&item.priceNum>=500000)return false;
    if(fP==='mid'&&(item.priceNum<500000||item.priceNum>1000000))return false;
    if(fP==='high'&&item.priceNum<=1000000)return false;
    if(fN==='yes'&&!item.negotiable)return false;
    if(fN==='no'&&item.negotiable)return false;
    if(fD&&item.district!==fD)return false;
    return true;
  });
  document.getElementById('result-count').textContent=filtered.length+' '+t.totalFound;
  var c=document.getElementById('listings-container');
  if(filtered.length===0){c.innerHTML='<div class="no-listings">🏜️ '+t.noListings+'</div>';return;}
  var html='';
  filtered.forEach(function(item){
    var isUnlocked=unlockedIds.indexOf(item.id)!==-1;
    var itemStr=JSON.stringify(item).replace(/"/g,'&quot;');
    var distDisplay = item.district || item.po;
    html+='<div class="listing-card">';
    html+='<div class="listing-top"><div>';
    html+='<div class="listing-price">₹ '+item.price+'</div>';
    if(item.negotiable)html+='<div class="listing-neg">'+t.negLabel+'</div>';
    if(item.type)html+='<div class="listing-type-badge">'+item.type+'</div>';
    if(item.verified)html+='<span class="verified-badge">✓ '+t.verifiedLabel+'</span>';
    html+='</div><div style="font-size:28px">🏡</div></div>';
    if(item.photos&&item.photos.length>0){html+='<div class="listing-photos">';item.photos.forEach(function(s){html+='<img class="listing-photo" src="'+s+'"/>';});html+='</div>';}
    if(item.hasVideo)html+='<div class="media-tag"><span>🎥</span><span>'+t.videoAvail+'</span></div>';
    html+='<div class="info-row"><span class="info-lbl">'+t.locLbl+':</span><span>'+item.po+', '+distDisplay+', পশ্চিমবঙ্গ</span></div>';
    if(item.road)html+='<div class="info-row"><span class="info-lbl">'+t.roadLbl+':</span><span>'+item.road+'</span></div>';
    if(item.landmark)html+='<div class="info-row"><span class="info-lbl">'+t.landLbl+':</span><span>'+item.landmark+'</span></div>';
    if(item.size)html+='<div class="info-row"><span class="info-lbl">'+t.sizeLbl+':</span><span>'+item.size+' '+item.unit+'</span></div>';
    if(item.facing)html+='<div class="info-row"><span class="info-lbl">'+t.faceLbl+':</span><span>'+item.facing+'</span></div>';
    if(isUnlocked){
      html+='<div class="unlocked-box"><div class="unlocked-label">'+t.unlockedLabel+'</div>';
      html+='<div class="action-btns"><a class="btn-call" href="tel:'+item.mobile+'">'+t.callBtn+'</a><a class="btn-wa" href="https://wa.me/91'+item.mobile+'" target="_blank">'+t.waBtn+'</a></div></div>';
    }else{
      html+='<div class="locked-number"><div style="font-size:22px">🔒</div>';
      html+='<div style="font-size:15px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:3px;margin:6px 0;">'+maskNumber(item.mobile)+'</div>';
      html+='<div class="locked-text">'+t.lockedText+'</div>';
      html+='<button class="unlock-btn" onclick="openUnlockModal('+item.id+')">'+t.unlockBtn+'</button></div>';
    }
    if(item.maps)html+='<a class="btn-maps" href="'+item.maps+'" target="_blank">'+t.mapsBtn+'</a>';
    html+='<button class="share-btn" onclick=\'shareOnWhatsApp('+itemStr+')\'>'+t.shareBtn+'</button>';
    html+='</div>';
  });
  c.innerHTML=html;
}
